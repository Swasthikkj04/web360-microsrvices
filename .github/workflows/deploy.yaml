name: WebPulse360 CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:v2 ./backend

    - name: Push Backend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:v2

    - name: Build Analyzer
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/analyzer:v2 ./analyzer

    - name: Push Analyzer
      run: docker push ${{ secrets.DOCKER_USERNAME }}/analyzer:v2
